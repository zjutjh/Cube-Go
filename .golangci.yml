version: "2"
run:
  modules-download-mode: readonly
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - dupl
    - errcheck
    - prealloc
    - revive
    - staticcheck
    - unparam
    - unused
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - fmt:.*
        - io/ioutil:^Read.*
    goconst:
      min-len: 3
      min-occurrences: 3
    nakedret:
      max-func-lines: 0
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    revive:
      confidence: 0.1
      enable-all-rules: true
      rules:
        - name: unchecked-type-assertion
          disabled: true
        - name: var-naming
          severity: warning
          disabled: true
        - name: line-length-limit
          severity: warning
          disabled: true
        - name: add-constant
          severity: warning
          disabled: true
        - name: package-comments
          severity: warning
          disabled: true
        - name: import-alias-naming
          severity: warning
          disabled: true
        - name: get-return
          severity: warning
          disabled: true
        - name: max-public-structs
          severity: warning
          disabled: true
        - name: argument-limit
          severity: warning
          disabled: true
        - name: function-length
          severity: warning
          disabled: true
        - name: cyclomatic
          severity: warning
          disabled: true
        - name: cognitive-complexity
          severity: warning
          disabled: true
        - name: deep-exit
          disabled: true
        - name: flag-parameter
          disabled: true
    staticcheck:
      checks:
        - SA1000
        - SA1001
        - SA1012
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
